<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    >

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    >

    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap"
      rel="stylesheet"
    >

    <link rel="stylesheet" href="./style.css">

    <title>Dustin Dev</title>
  </head>

  <body>
    <header>
      <div class="brand">
        <img
          class="logo"
          src="./images/dc-logo.png"
          alt="Dustin Clarence DC Logo"
          width="50"
          height="50"
        >

        <h1 class="logo-name">Dustin Dev</h1>

        <!-- brand -->
      </div>

      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Projects</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </header>

    <section class="hero">
      <div class="left-hero">
        <h2 class="main-text">
          Building websites that stand out
        </h2>

        <p class="secondary-text">
          Hi! I'm Dustin, an aspiring Full Stack Web Developer from the
          Philippines. I'm currently learning through The Odin Project while
          building modern, responsive, and user-friendly websites.
        </p>

        <a href="#" class="button">View Projects</a>

        <!-- left-hero -->
      </div>

      <img
        class="hero-image"
        src="./images/hero-image.jpg"
        alt="Web developer coding on a laptop"
        width="440"
        height="260"
      >

      <!-- hero -->
    </section>
  </body>
</html>
